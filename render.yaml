services:
  - type: web
    name: arc-mentor-connect
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    headers:
      - path: /index.html
        name: Cache-Control
        value: "no-store, no-cache, must-revalidate"
      - path: /index.html
        name: Content-Security-Policy
        value: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data: blob:; style-src * 'unsafe-inline'; font-src *;"
      - path: /*
        name: Content-Security-Policy
        value: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data: blob:; style-src * 'unsafe-inline'; font-src *;"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      - type: rewrite
        source: /*
        destination: /index.html
